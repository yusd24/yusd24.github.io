  summary: I am an assistant professor at the Department of Mathematics, National Cheng Kung University. My research interests include mirror symmetry, Gromov-Witten theory, quantum cohomology, and Calabi-Yau geometry. I received my Ph.D. from National Taiwan University in 2016, and I was a postdoctoral fellow at the Center of Mathematical Sciences and Applications, Harvard University from 2018 to 2023.
