        summary: My Ph.D. thesis is on the topic of mirror symmetry, which is a duality between symplectic geometry and complex geometry. I am interested in the mathematical aspects of mirror symmetry, such as Gromov-Witten theory, quantum cohomology, and Calabi-Yau geometry.0    
